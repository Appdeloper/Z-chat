<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG CHAT // NEON EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white h-screen overflow-hidden font-inter selection:bg-cyan-500/30">

    <audio id="notify-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="auth-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black transition-opacity duration-500">
        <div class="absolute inset-0 bg-cyan-500 blur-[100px] opacity-10"></div>
        <div class="relative z-10 w-full max-w-sm p-8 glass-panel rounded-3xl border border-cyan-500/20 text-center shadow-[0_0_50px_rgba(0,255,255,0.1)]">
            <h1 class="font-z text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 mb-2">OG CHAT</h1>
            <p class="text-xs text-zinc-500 tracking-[0.3em] uppercase mb-8">Enter the Grid</p>
            
            <input type="text" id="username-input" placeholder="Choose a Username" class="z-input mb-4 text-center text-lg" autocomplete="off">
            <button id="login-btn" class="w-full bg-cyan-500 text-black font-z font-black py-4 rounded-xl uppercase tracking-widest hover:bg-cyan-400 transition hover:shadow-[0_0_20px_rgba(0,255,255,0.5)]">
                Initialize Uplink
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden h-full flex w-full max-w-6xl mx-auto border-x border-white/5 shadow-2xl relative">
        
        <aside class="w-72 bg-[#0a0a0a] border-r border-white/5 flex flex-col hidden md:flex">
            <div class="p-6 border-b border-white/5">
                <h2 class="font-z text-2xl font-black text-cyan-400">OG CHAT</h2>
                <div class="flex items-center gap-2 mt-2 text-xs text-zinc-500 font-bold uppercase tracking-widest">
                    <span id="display-username" class="text-white"></span>
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span id="streak-counter" class="text-orange-500 flex items-center gap-1 ml-auto"><i data-lucide="flame" class="w-3 h-3"></i> 0</span>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar" id="room-list">
                </div>
            <div class="p-4 border-t border-white/5">
                <button id="z-scanner-btn" class="w-full bg-purple-600/20 border border-purple-500/50 text-purple-400 py-3 rounded-xl font-z font-bold flex items-center justify-center gap-2 hover:bg-purple-600/40 transition">
                    <i data-lucide="scan-line"></i> Z-SCANNER
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-black relative">
            <header class="h-20 glass-panel border-b border-white/5 flex items-center justify-between px-6 z-10">
                <div>
                    <h3 id="current-room-name" class="font-z text-xl font-bold text-white uppercase tracking-wider">GLOBAL</h3>
                    <p class="text-xs text-cyan-500 font-bold tracking-widest uppercase">Public Channel</p>
                </div>
                <button id="logout-btn" class="text-zinc-500 hover:text-red-500 transition"><i data-lucide="log-out"></i></button>
            </header>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar scroll-smooth">
                </div>

            <div id="typing-indicator" class="px-6 py-2 text-xs text-cyan-500 font-bold italic hidden animate-pulse">
                Someone is typing...
            </div>

            <footer class="p-4 glass-panel border-t border-white/5">
                <form id="chat-form" class="flex gap-3">
                    <input type="text" id="message-input" placeholder="Broadcast transmission..." class="z-input flex-1" autocomplete="off">
                    <button type="submit" class="w-14 h-14 bg-cyan-500 rounded-2xl flex items-center justify-center text-black shadow-[0_0_15px_rgba(0,255,255,0.3)] hover:scale-105 transition active:scale-95">
                        <i data-lucide="send" class="w-6 h-6 ml-1"></i>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <div id="scanner-modal" class="hidden absolute inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[#0a0a0a] border border-purple-500 p-6 rounded-3xl w-full max-w-lg shadow-[0_0_50px_rgba(191,0,255,0.2)]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-z text-2xl font-black text-purple-400 flex items-center gap-2"><i data-lucide="cpu"></i> Z-SCAN ANALYSIS</h2>
                <button id="close-scanner" class="text-zinc-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="p-4 bg-white/5 rounded-xl border border-white/10">
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Most Active User</span>
                    <h3 id="scan-active-user" class="text-lg font-black text-cyan-400 mt-1">Analyzing...</h3>
                </div>
                
                <div class="p-4 bg-white/5 rounded-xl border border-white/10">
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold mb-2 block">Critical Highlights (Urgent/Exam/Important)</span>
                    <div id="scan-highlights" class="space-y-2 max-h-32 overflow-y-auto no-scrollbar text-sm text-zinc-300">
                        Scanning database...
                    </div>
                </div>

                <div class="p-4 bg-purple-900/20 rounded-xl border border-purple-500/30">
                    <span class="text-[10px] text-purple-400 uppercase tracking-widest font-bold mb-2 block">Last 10 Messages Summary</span>
                    <p id="scan-summary" class="text-xs text-zinc-300 leading-relaxed italic">Processing...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
